<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frey Williams HVAC</title>

<style>
body { font-family: Arial; padding: 15px; background:#f5f7fa; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
select, input, textarea, button { width:100%; padding:10px; margin-top:5px; }
button { background:#1e3a8a; color:white; border:none; font-weight:bold; margin-top:10px;}
.result { font-size:16px; margin-top:15px; font-weight:bold; white-space:pre-line;}
.registros { background:white; padding:10px; margin-top:10px; border-radius:10px;}
</style>
</head>

<body>

<h2 style="text-align:center;">Frey Williams HVAC</h2>

<div class="card"><label>Nombre Cliente</label><input id="cliente"></div>
<div class="card"><label>Dirección</label><input id="direccion"></div>
<div class="card"><label>Teléfono</label><input id="telefono"></div>
<div class="card"><label>Observaciones Cliente</label><textarea id="observaciones"></textarea></div>
<div class="card"><label>Observación Técnica</label><textarea id="obs_tecnica"></textarea></div>

<div class="card"><label>Interior</label>
<select id="interior"><option value="1">Fácil</option><option value="2">Media</option><option value="3">Difícil</option></select></div>

<div class="card"><label>Exterior</label>
<select id="exterior"><option value="1">Fácil</option><option value="2">Media</option><option value="3">Difícil</option></select></div>

<div class="card"><label>Distancia</label>
<select id="distancia"><option value="1"><3m</option><option value="2">3-5m</option><option value="3">>5m</option></select></div>

<div class="card"><label>Muro</label>
<select id="muro"><option value="1">Simple</option><option value="2">Hormigón</option><option value="3">Estructural</option></select></div>

<div class="card"><label>Electricidad</label>
<select id="electricidad"><option value="1">Lista</option><option value="2">Ajuste</option><option value="3">Nueva</option></select></div>

<div class="card"><label>Intervención</label>
<select id="intervencion"><option value="1">Baja</option><option value="2">Media</option><option value="3">Alta</option></select></div>

<button onclick="evaluar()">Evaluar instalación</button>

<div class="result" id="resultado"></div>

<script>
function evaluar(){

let cliente = document.getElementById("cliente").value;
let direccion = document.getElementById("direccion").value;
let telefono = document.getElementById("telefono").value;
let observaciones = document.getElementById("observaciones").value;
let obs_tecnica = document.getElementById("obs_tecnica").value;

let interior = +document.getElementById("interior").value;
let exterior = +document.getElementById("exterior").value;
let distancia = +document.getElementById("distancia").value;
let muro = +document.getElementById("muro").value;
let electricidad = +document.getElementById("electricidad").value;
let intervencion = +document.getElementById("intervencion").value;

let score = interior+exterior+distancia+muro+electricidad+intervencion;

let clasificacion = score<=8 ? "A" : score<=12 ? "B" : "C";
let recomendacion = score<=8 ? "Tomar" : score<=12 ? "Evaluar" : "Evitar";

/* ANALISIS */
let analisis = [];
if(distancia==3) analisis.push("Distancia alta");
if(muro==3) analisis.push("Muro estructural");
if(electricidad==3) analisis.push("Electricidad nueva");

document.getElementById("resultado").innerText =
`Clasificación: ${clasificacion} (${score}) | ${recomendacion}`;

/* ENVIO A GOOGLE SHEETS (FORMA ESTABLE) */
let formData = new FormData();

formData.append("cliente", cliente);
formData.append("direccion", direccion);
formData.append("telefono", telefono);
formData.append("observaciones", observaciones);
formData.append("obs_tecnica", obs_tecnica);
formData.append("interior", interior);
formData.append("exterior", exterior);
formData.append("distancia", distancia);
formData.append("muro", muro);
formData.append("electricidad", electricidad);
formData.append("intervencion", intervencion);
formData.append("clasificacion", clasificacion);
formData.append("score", score);
formData.append("recomendacion", recomendacion);
formData.append("analisis", analisis.join(" | "));

fetch("https://script.google.com/macros/s/AKfycbwx7WJHFTGrIsTwAgLuy_o6vaXC356hce9ZVmJmqN0v96vxDqT0QzPvXKBBez8Nu-Im/exec", {
  method: "POST",
  body: formData
});

alert("Enviado ✔");
}
</script>

</body>
</html>
