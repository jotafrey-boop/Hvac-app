<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frey Williams HVAC</title>

<style>
body { font-family: Arial; padding: 15px; background:#f5f7fa; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
select, input, textarea, button { width:100%; padding:10px; margin-top:5px; }
button { background:#1e3a8a; color:white; border:none; font-weight:bold; margin-top:10px;}
.result { font-size:16px; margin-top:15px; font-weight:bold; white-space:pre-line;}
.registros { background:white; padding:10px; margin-top:10px; border-radius:10px;}
</style>
</head>

<body>

<h2 style="text-align:center;">Frey Williams HVAC</h2>

<div class="card">
<label>Nombre Cliente</label>
<input id="cliente">
</div>

<div class="card">
<label>Dirección</label>
<input id="direccion">
</div>

<div class="card">
<label>Teléfono</label>
<input id="telefono">
</div>

<div class="card">
<label>Observaciones Cliente</label>
<textarea id="observaciones"></textarea>
</div>

<div class="card">
<label>Observación Técnica</label>
<textarea id="obs_tecnica"></textarea>
</div>

<div class="card">
<label>Interior</label>
<select id="interior"><option value="1">Fácil</option><option value="2">Media</option><option value="3">Difícil</option></select>
</div>

<div class="card">
<label>Exterior</label>
<select id="exterior"><option value="1">Fácil</option><option value="2">Media</option><option value="3">Difícil</option></select>
</div>

<div class="card">
<label>Distancia</label>
<select id="distancia"><option value="1"><3m</option><option value="2">3-5m</option><option value="3">>5m</option></select>
</div>

<div class="card">
<label>Muro</label>
<select id="muro"><option value="1">Simple</option><option value="2">Hormigón</option><option value="3">Estructural</option></select>
</div>

<div class="card">
<label>Electricidad</label>
<select id="electricidad"><option value="1">Lista</option><option value="2">Ajuste</option><option value="3">Nueva</option></select>
</div>

<div class="card">
<label>Intervención</label>
<select id="intervencion"><option value="1">Baja</option><option value="2">Media</option><option value="3">Alta</option></select>
</div>

<button onclick="evaluar()">Evaluar instalación</button>
<button onclick="verRegistros()">Ver registros</button>
<button onclick="exportar()">Exportar a Excel</button>
<button onclick="borrarRegistros()" style="background:#c0392b;">Borrar registros</button>

<div class="result" id="resultado"></div>
<div class="registros" id="lista"></div>

<script>
function evaluar(){

let cliente = document.getElementById("cliente").value;
let direccion = document.getElementById("direccion").value;
let telefono = document.getElementById("telefono").value;
let observaciones = document.getElementById("observaciones").value;
let obs_tecnica = document.getElementById("obs_tecnica").value;

let interior = +document.getElementById("interior").value;
let exterior = +document.getElementById("exterior").value;
let distancia = +document.getElementById("distancia").value;
let muro = +document.getElementById("muro").value;
let electricidad = +document.getElementById("electricidad").value;
let intervencion = +document.getElementById("intervencion").value;

let score = interior+exterior+distancia+muro+electricidad+intervencion;

let clasificacion = "";
let recomendacion = "";

if(score<=8){ clasificacion="A"; recomendacion="Tomar"; }
else if(score<=12){ clasificacion="B"; recomendacion="Evaluar"; }
else{ clasificacion="C"; recomendacion="Evitar"; }

/* ANALISIS */
let analisis = [];

if(distancia == 3){
  analisis.push("Distancia alta (>5m) → mayor carga de trabajo");
}
if(muro == 3){
  analisis.push("Muro estructural → perforación compleja");
}
if(electricidad == 3){
  analisis.push("Instalación eléctrica nueva requerida");
}
if(interior == 3){
  analisis.push("Condición interior difícil");
}
if(exterior == 3){
  analisis.push("Condición exterior difícil");
}
if(intervencion == 3){
  analisis.push("Alta intervención en infraestructura");
}

/* RESULTADO */
let textoAnalisis = analisis.length > 0 
  ? "\n\n" + analisis.map(a => "⚠️ " + a).join("\n")
  : "";

document.getElementById("resultado").innerText =
`Clasificación: ${clasificacion} (${score}) | Acción: ${recomendacion}${textoAnalisis}`;

/* DATA */
let data = {
fecha:new Date().toLocaleString(),
cliente,direccion,telefono,
observaciones,obs_tecnica,
interior,exterior,distancia,muro,electricidad,intervencion,
clasificacion,score,recomendacion,
analisis: analisis.join(" | ")
};

/* GUARDADO LOCAL */
let registros = JSON.parse(localStorage.getItem("registros")) || [];
registros.push(data);
localStorage.setItem("registros", JSON.stringify(registros));

/* ENVIO A GOOGLE SHEETS */
fetch("https://script.google.com/macros/s/AKfycbwx7WJHFTGrIsTwAgLuy_o6vaXC356hce9ZVmJmqN0v96vxDqT0QzPvXKBBez8Nu-Im/exec", {
  method: "POST",
  body: JSON.stringify(data),
  headers: {
    "Content-Type": "application/json"
  }
})
.then(res => console.log("Enviado a Google Sheets"))
.catch(err => console.error("Error:", err));

alert("Guardado ✔");
}

/* VER REGISTROS */
function verRegistros(){
let registros = JSON.parse(localStorage.getItem("registros")) || [];

if(registros.length === 0){
  document.getElementById("lista").innerHTML = "Sin registros";
  return;
}

let html = "";

registros.slice().reverse().forEach(r=>{
html += `<div style="border-bottom:1px solid #ddd; padding:5px;">
<b>${r.cliente}</b><br>
${r.clasificacion} (${r.score}) - ${r.recomendacion}<br>
<i>${r.analisis || ""}</i>
</div>`;
});

document.getElementById("lista").innerHTML = html;
}

/* EXPORTAR */
function exportar(){
let registros = JSON.parse(localStorage.getItem("registros")) || [];

if(registros.length === 0){
  alert("No hay datos");
  return;
}

let csv = "Fecha,Cliente,Direccion,Telefono,Obs Cliente,Obs Tecnica,Interior,Exterior,Distancia,Muro,Electricidad,Intervencion,Clasificacion,Score,Recomendacion,Analisis\n";

registros.forEach(r=>{
  csv += `${r.fecha},${r.cliente},${r.direccion},${r.telefono},${r.observaciones},${r.obs_tecnica},${r.interior},${r.exterior},${r.distancia},${r.muro},${r.electricidad},${r.intervencion},${r.clasificacion},${r.score},${r.recomendacion},${r.analisis}\n`;
});

let blob = new Blob([csv], { type: 'text/csv' });
let url = window.URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "registros_hvac.csv";
a.click();
}

/* BORRAR */
function borrarRegistros(){
if(confirm("¿Seguro que quieres borrar todos los registros?")){
  localStorage.removeItem("registros");
  document.getElementById("lista").innerHTML = "";
  alert("Registros eliminados ✔");
}
}
</script>

</body>
</html>
